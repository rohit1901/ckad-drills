questions:
  - id: YQ-FIX-01
    domain: Application Design and Build (20%)
    topic: Define, build, and modify container images
    scenario: Sample scenario for fixture testing.
    tasks: |
      1. Do something.
      2. Verify it.
    setup:
      - run: echo setup-step
    verify:
      - name: stdout equals
        run: echo hello
        expect:
          equals: hello
      - name: stdout contains
        run: echo "the quick brown fox"
        expect:
          contains: quick
      - name: stdout matches regex
        run: echo "abc123"
        expect:
          regex: "^[a-z]+[0-9]+$"
      - name: exit code is 0 by default
        run: "true"
    teardown:
      - run: echo teardown-step
    hints: Sample hint.

  - id: YQ-FIX-02
    domain: Services and Networking (20%)
    topic: Demonstrate basic understanding of NetworkPolicies
    scenario: A scenario whose verify is a single shell pipeline.
    tasks: |
      1. Just exit zero.
    verify: "true"
    hints: ""
