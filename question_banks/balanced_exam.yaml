# CKAD-style balanced exam blueprint.
#
# This file is loaded by exam mode ONLY (see `--mode exam` in the CLI). The
# runtime uses each entry's (domain, topic) pair as a "slot" and samples a
# real question with a matching (or domain-only fallback) shape from the full
# YAML question bank. The scenario / tasks / verify content here is never
# shown to the student, so they're intentionally minimal — edit this file
# only to rebalance the exam shape.
#
# The 15-slot mix below tracks the published CKAD weighting:
#   Application Design and Build               20%  -> 3 slots
#   Application Deployment                     20%  -> 3 slots
#   Application Observability and Maintenance  15%  -> 2 slots
#   Application Environment, Config & Security 25%  -> 4 slots
#   Services and Networking                    20%  -> 3 slots
#                                              ---     --
#                                             100%    15

